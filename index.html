<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F59E0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dad HQ">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Dad HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F3FF;
      --card: #FFFFFF;
      --border: #E5E1FF;
      --text: #1A1523;
      --muted: #6B7280;
      --faint: #F9F8FF;

      --act: #F59E0B;
      --act-bg: #FFFBEB;
      --act-dark: #92400E;

      --meal: #10B981;
      --meal-bg: #ECFDF5;
      --meal-dark: #065F46;

      --craft: #8B5CF6;
      --craft-bg: #F5F3FF;
      --craft-dark: #4C1D95;

      --r: 14px;
      --r-sm: 8px;
      --shadow: 0 2px 12px rgba(99,102,241,0.08);
      --shadow-lg: 0 8px 30px rgba(99,102,241,0.15);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    /* ── HEADER ── */
    header {
      background: white;
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    .header-inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 1rem 1.5rem 0;
    }
    .app-title {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    .app-title .highlight { color: var(--act); }
    .tab-bar { display: flex; gap: 0; margin-top: 0.75rem; }
    .tab-btn {
      flex: 1;
      padding: 0.7rem 0.5rem;
      border: none;
      background: none;
      font-family: 'Nunito', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: all 0.18s;
    }
    .tab-btn.active[data-tab="activities"] { color: var(--act); border-bottom-color: var(--act); }
    .tab-btn.active[data-tab="meals"]      { color: var(--meal); border-bottom-color: var(--meal); }
    .tab-btn.active[data-tab="crafts"]     { color: var(--craft); border-bottom-color: var(--craft); }

    /* ── MAIN ── */
    main { max-width: 920px; margin: 0 auto; padding: 1.5rem; }
    .tab-view { display: none; }
    .tab-view.active { display: block; }

    /* ── CHIPS ── */
    .chip-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.8rem; }
    .chip {
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
      user-select: none;
    }
    .chip:hover { border-color: #C4B5FD; color: var(--craft); }
    .chip.on-act  { border-color: var(--act);  color: var(--act-dark);  background: var(--act-bg); }
    .chip.on-meal { border-color: var(--meal); color: var(--meal-dark); background: var(--meal-bg); }
    .chip.on-craft{ border-color: var(--craft);color: var(--craft-dark);background: var(--craft-bg); }

    /* ── FILTER ROW ── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--r);
      padding: 0.75rem 1rem;
    }
    .filter-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    input[type="range"] { accent-color: var(--act); cursor: pointer; }
    #dist-label { font-size: 0.82rem; font-weight: 800; color: var(--act); min-width: 40px; }

    /* ── RANDOM BUTTON ── */
    .random-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.6rem;
      border-radius: 999px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s;
      margin-bottom: 1.25rem;
    }
    .random-btn:hover { transform: scale(1.04); box-shadow: var(--shadow-lg); }
    .random-btn:active { transform: scale(0.97); }
    .btn-act   { background: var(--act);   color: white; }
    .btn-meal  { background: var(--meal);  color: white; }
    .btn-craft { background: var(--craft); color: white; }

    /* ── RANDOM RESULT BANNER ── */
    .random-banner {
      display: none;
      border-radius: var(--r);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      position: relative;
      animation: slideUp 0.22s ease;
    }
    .random-banner.show { display: block; }
    .random-banner.act-theme   { background: var(--act-bg);   border: 2px solid var(--act); }
    .random-banner.meal-theme  { background: var(--meal-bg);  border: 2px solid var(--meal); }
    .random-banner.craft-theme { background: var(--craft-bg); border: 2px solid var(--craft); }
    .random-banner .rb-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.3rem;
      opacity: 0.6;
    }
    .random-banner .rb-name { font-size: 1.25rem; font-weight: 900; margin-bottom: 0.35rem; }
    .random-banner .rb-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
    .rb-close {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: rgba(0,0,0,0.08); border: none; border-radius: 50%;
      width: 26px; height: 26px; font-size: 0.75rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .rb-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.6rem; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.9rem;
    }
    .section-count { font-size: 0.75rem; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .add-btn {
      display: flex; align-items: center; gap: 0.25rem;
      padding: 0.38rem 0.85rem;
      border-radius: 999px;
      border: 2px dashed var(--border);
      background: none;
      font-family: 'Nunito', sans-serif;
      font-size: 0.8rem; font-weight: 700;
      color: var(--muted); cursor: pointer;
      transition: all 0.15s;
    }
    .add-btn:hover { border-color: var(--craft); color: var(--craft); }

    /* ── CARDS GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(265px, 1fr));
      gap: 1rem;
    }
    .card {
      background: var(--card);
      border-radius: var(--r);
      padding: 1.1rem 1.15rem;
      border: 2px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: #C4B5FD; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.45rem; }
    .card-icon { font-size: 1.4rem; margin-right: 0.6rem; flex-shrink: 0; }
    .card-name { font-size: 0.97rem; font-weight: 800; line-height: 1.3; flex: 1; }
    .fav-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 2px; transition: transform 0.15s; flex-shrink: 0; }
    .fav-btn:hover { transform: scale(1.25); }
    .card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.7rem; }
    .card-badges { display: flex; flex-wrap: wrap; gap: 0.35rem; }

    /* ── BADGES ── */
    .badge {
      font-size: 0.7rem; font-weight: 700;
      padding: 0.18rem 0.5rem;
      border-radius: 5px;
    }
    .b-dist  { background: #EFF6FF; color: #1D4ED8; }
    .b-free  { background: #DCFCE7; color: #166534; }
    .b-paid  { background: #FEF3C7; color: #92400E; }
    .b-pricey{ background: #FEE2E2; color: #991B1B; }
    .b-rain  { background: #E0F2FE; color: #0369A1; }
    .b-sun   { background: #FEF9C3; color: #854D0E; }
    .b-both  { background: #F0FDF4; color: #166534; }
    .b-time  { background: #F3F4F6; color: #374151; }
    .b-mess1 { background: #F0FDF4; color: #166534; }
    .b-mess2 { background: #FEF9C3; color: #854D0E; }
    .b-mess3 { background: #FEE2E2; color: #991B1B; }
    .b-cat   { background: var(--craft-bg); color: var(--craft-dark); }

    /* ── SPOTLIGHT MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,21,35,0.55);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      animation: fadeIn 0.15s ease;
    }
    .spotlight {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      position: relative;
      animation: slideUp 0.2s ease;
      max-height: 85vh;
      overflow-y: auto;
    }
    .sp-close {
      position: absolute; top: 1rem; right: 1rem;
      background: #F3F4F6; border: none;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 0.9rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .sp-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .sp-title { font-size: 1.35rem; font-weight: 900; margin-bottom: 0.6rem; padding-right: 2rem; }
    .sp-badges { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.9rem; }
    .sp-desc { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
    .sp-section { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.35rem; margin-top: 0.9rem; }
    .sp-list { list-style: none; }
    .sp-list li { font-size: 0.85rem; padding: 0.25rem 0; color: var(--text); }
    .sp-list li::before { content: "•  "; color: var(--craft); font-weight: 900; }
    .sp-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }
    .btn {
      padding: 0.55rem 1.15rem;
      border-radius: 999px; border: 2px solid transparent;
      font-family: 'Nunito', sans-serif; font-size: 0.83rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-outline { background: white; border-color: var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: #C4B5FD; color: var(--craft); }

    /* ── ADD MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26,21,35,0.55);
      z-index: 300;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 1.75rem;
      max-width: 420px;
      width: 100%;
      animation: slideUp 0.2s ease;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal h3 { font-size: 1.15rem; font-weight: 900; margin-bottom: 1.15rem; }
    .form-group { margin-bottom: 0.9rem; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--muted); margin-bottom: 0.3rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 0.55rem 0.75rem;
      border: 2px solid var(--border); border-radius: var(--r-sm);
      font-family: 'Nunito', sans-serif; font-size: 0.88rem;
      outline: none; transition: border-color 0.15s; color: var(--text);
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--craft); }
    .form-group textarea { resize: vertical; min-height: 65px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty .e-icon { font-size: 2.8rem; margin-bottom: 0.5rem; }
    .empty p { font-size: 0.9rem; font-weight: 600; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pop { 0%,100% { transform:scale(1); } 50% { transform:scale(1.06); } }
    .popping { animation: pop 0.25s ease 2; }

    /* ── RESPONSIVE ── */
    @media (max-width: 580px) {
      .cards-grid { grid-template-columns: 1fr; }
      main { padding: 1rem; }
      .filter-row { flex-direction: column; align-items: flex-start; gap: 0.6rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="app-title">Dad <span class="highlight">HQ</span></div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="activities">🗺️ Activities</button>
      <button class="tab-btn" data-tab="meals">🍽️ Meals</button>
      <button class="tab-btn" data-tab="crafts">🎨 Crafts</button>
    </div>
  </div>
</header>

<main>

  <!-- ── ACTIVITIES ── -->
  <div class="tab-view active" id="tab-activities">
    <div class="chip-row" id="act-cat-row"></div>
    <div class="chip-row" id="act-region-row"></div>
    <div class="filter-row">
      <span class="filter-label">Max distance</span>
      <input type="range" id="dist-slider" min="10" max="160" value="160" step="10" style="width:140px;">
      <span id="dist-label">Any</span>
      <span class="filter-label" style="margin-left:0.5rem;">Cost</span>
      <div class="chip-row" style="margin:0;" id="price-row"></div>
    </div>
    <button class="random-btn btn-act" id="rand-act">🎲 Surprise me!</button>
    <div class="random-banner act-theme" id="rb-act"></div>
    <div class="section-header">
      <span class="section-count" id="act-count"></span>
      <button class="add-btn" id="add-act-btn">+ Add place</button>
    </div>
    <div class="cards-grid" id="act-grid"></div>
  </div>

  <!-- ── MEALS ── -->
  <div class="tab-view" id="tab-meals">
    <div class="chip-row" id="meal-cat-row"></div>
    <button class="random-btn btn-meal" id="rand-meal">🍽️ What's for dinner?</button>
    <div class="random-banner meal-theme" id="rb-meal"></div>
    <div class="section-header">
      <span class="section-count" id="meal-count"></span>
      <button class="add-btn" id="add-meal-btn">+ Add meal</button>
    </div>
    <div class="cards-grid" id="meal-grid"></div>
  </div>

  <!-- ── CRAFTS ── -->
  <div class="tab-view" id="tab-crafts">
    <div class="chip-row" id="craft-cat-row"></div>
    <button class="random-btn btn-craft" id="rand-craft">🎲 Let's make something!</button>
    <div class="random-banner craft-theme" id="rb-craft"></div>
    <div class="section-header">
      <span class="section-count" id="craft-count"></span>
      <button class="add-btn" id="add-craft-btn">+ Add craft</button>
    </div>
    <div class="cards-grid" id="craft-grid"></div>
  </div>

</main>

<!-- SPOTLIGHT -->
<div class="overlay" id="spotlight-overlay" style="display:none;" onclick="onOverlayClick(event,'spotlight-overlay')">
  <div class="spotlight" id="spotlight-inner"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none;">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-act" id="modal-save">Save</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

};

function loadJSON(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } }
function saveJSON(k,v) { localStorage.setItem(k, JSON.stringify(v)); }

// ════════════════════════════════════════════

function weatherBadge(w) {
  if (w === 'indoor')  return '<span class="badge b-rain">☔ Rainy day</span>';
  if (w === 'outdoor') return '<span class="badge b-sun">☀️ Outdoors</span>';
  return '<span class="badge b-both">⛅ Any weather</span>';
}

function priceBadge(price, label) {
  if (price === 0) return `<span class="badge b-free">🆓 Free</span>`;
  if (price === 1) return `<span class="badge b-paid">£ ${label}</span>`;
  if (price === 2) return `<span class="badge b-paid">££ ${label}</span>`;
  return `<span class="badge b-pricey">£££ ${label}</span>`;
}

function distBadge(d) {
  return `<span class="badge b-dist">📍 ${d} miles</span>`;
}

function timeBadge(t) {
  if (t < 60) return `<span class="badge b-time">⏱️ ${t} min</span>`;
  return `<span class="badge b-time">⏱️ ${Math.floor(t/60)}h ${t%60?t%60+'m':''}</span>`;
}

function messBadge(m) {
  const labels = ['','🟢 Tidy','🟡 Messy','🔴 Very messy'];
  const cls = ['','b-mess1','b-mess2','b-mess3'];
  return `<span class="badge ${cls[m]}">${labels[m]}</span>`;
}

function helpBadge(h) {
  const labels = ['','👀 Watch','🤝 Help out','⭐ Kids lead'];
  return `<span class="badge b-cat">${labels[h]}</span>`;
}

function kidBadge(k) {
  const stars = '⭐'.repeat(k);
  return `<span class="badge b-cat">${stars} Kid fave</span>`;
}

  a11:'peaks',a12:'chester',a13:'manchester',a14:'chester',a15:'manchester',

};

function getRegion(a) { return a.region || REGION_MAP[a.id] || 'local'; }

function catLabel(cat) {
  const m = { outdoor:'Outdoor', museum:'Museum', theme_park:'Theme Park', sport:'Sport / Play',
               quick:'Quick win', proper:'Proper meal', weekend:'Weekend special', baking:'Baking',
               painting:'Painting', building:'Building', nature:'Nature', messy:'Messy', quiet:'Quiet',
               seasonal:'Seasonal', science:'Science', };
  return m[cat] || cat;
}

function catIcon(cat) {
  const m = { outdoor:'🌳', museum:'🏛️', theme_park:'🎡', sport:'🏊', indoor:'☔',
               quick:'⚡', proper:'🍲', weekend:'✨', baking:'🧁',
               painting:'🎨', building:'🏗️', nature:'🌿', messy:'💦', quiet:'📚',
               seasonal:'🎄', science:'🔬' };
  return m[cat] || '📌';
}

function favKey(type) {
  return type === 'act' ? 'actFavs' : type === 'meal' ? 'mealFavs' : 'craftFavs';
}

function toggleFav(type, id) {
  const key = favKey(type);
  const store = type === 'act' ? 'dh_actFavs' : type === 'meal' ? 'dh_mealFavs' : 'dh_craftFavs';
  if (S[key].has(id)) S[key].delete(id); else S[key].add(id);
  saveJSON(store, [...S[key]]);
  renderTab(S.tab);
}

function isFav(type, id) {
  return S[favKey(type)].has(id);
}

//  FILTERING
// ════════════════════════════════════════════

function filteredActs() {
  return [...ACTIVITIES, ...S.customActs].filter(a => {
    if (S.actCat === 'favs') return isFav('act', a.id);
    if (S.actCat !== 'all' && a.cat !== S.actCat) return false;
    if (S.actRegion !== 'all' && getRegion(a) !== S.actRegion) return false;
    if (a.dist > S.actMaxDist) return false;
    if (S.actMaxPrice !== 'all' && a.price !== parseInt(S.actMaxPrice)) return false;
    return true;
  });
}

function filteredMeals() {
  return [...MEALS, ...S.customMeals].filter(m => {
    if (S.mealCat === 'favs') return isFav('meal', m.id);
    if (S.mealCat !== 'all' && m.cat !== S.mealCat) return false;
    return true;
  });
}

function filteredCrafts() {
  return [...CRAFTS, ...S.customCrafts].filter(c => {
    if (S.craftCat === 'favs') return isFav('craft', c.id);
    if (S.craftCat !== 'all' && c.cat !== S.craftCat) return false;
    return true;
  });
}

function renderTab(tab) {
  if (tab === 'activities') renderActivities();
  if (tab === 'meals')      renderMeals();
  if (tab === 'crafts')     renderCrafts();
}

function renderActivities() {
  const items = filteredActs();
  document.getElementById('act-count').textContent = `${items.length} place${items.length!==1?'s':''}`;
  const grid = document.getElementById('act-grid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="e-icon">🗺️</div><p>No activities match your filters</p></div>`;
    return;
  }
  grid.innerHTML = items.map(a => actCard(a)).join('');
}

function actCard(a) {
  const fav = isFav('act', a.id);
  return `<div class="card" onclick="openSpotlight('act','${a.id}')">
    <div class="card-top">
      <span class="card-icon">${a.icon}</span>
      <span class="card-name">${a.name}</span>
      <button class="fav-btn" onclick="event.stopPropagation();toggleFav('act','${a.id}')">${fav?'⭐':'☆'}</button>
    </div>
    <div class="card-desc">${a.desc}</div>
    <div class="card-badges">
      ${distBadge(a.dist)}
      ${priceBadge(a.price, a.priceLabel)}
      ${weatherBadge(a.weather)}
    </div>
  </div>`;
}

  const fav = isFav('meal', m.id);

function allById(type) {
  if (type === 'act')   return [...ACTIVITIES, ...S.customActs];
  if (type === 'meal')  return [...MEALS, ...S.customMeals];
  if (type === 'craft') return [...CRAFTS, ...S.customCrafts];
}

function openSpotlight(type, id) {
  const item = allById(type).find(x => x.id === id);
  if (!item) return;
  const inner = document.getElementById('spotlight-inner');
  const fav = isFav(type, id);

  let extra = '';
  if (type === 'act') {
    extra = `
      <div class="sp-section">Tags</div>
      <div class="rb-badges">${(item.tags||[]).map(t=>`<span class="badge b-cat">${t}</span>`).join('')}</div>
      ${item.url ? `<div class="sp-section">Website</div><a href="${item.url}" target="_blank" style="font-size:.85rem;color:var(--craft);">${item.url}</a>` : ''}
    `;
  } else if (type === 'meal') {
    extra = `
      <div class="sp-section">Key Ingredients</div>
      <ul class="sp-list">${(item.ingredients||[]).map(i=>`<li>${i}</li>`).join('')}</ul>
      <div class="sp-section">Kitchen info</div>
      <div class="rb-badges">
        ${helpBadge(item.helpRating)}
        ${kidBadge(item.kidRating)}
      </div>
    `;
  } else if (type === 'craft') {
    extra = `
      <div class="sp-section">You'll need</div>
      <ul class="sp-list">${(item.materials||[]).map(m=>`<li>${m}</li>`).join('')}</ul>
    `;
  }

  inner.innerHTML = `
    <button class="sp-close" onclick="closeSpotlight()">✕</button>
    <div class="sp-icon">${item.icon}</div>
    <div class="sp-title">${item.name}</div>
    <div class="sp-badges">
      ${type==='act' ? distBadge(item.dist)+priceBadge(item.price,item.priceLabel)+weatherBadge(item.weather) : ''}
      ${type==='meal' ? timeBadge(item.time)+`<span class="badge b-cat">${catIcon(item.cat)} ${catLabel(item.cat)}</span>` : ''}
      ${type==='craft' ? timeBadge(item.time)+messBadge(item.mess)+`<span class="badge b-cat">${catIcon(item.cat)} ${catLabel(item.cat)}</span>` : ''}
    </div>
    <div class="sp-desc">${item.desc}</div>
    ${extra}
    <div class="sp-actions">
      <button class="btn btn-${type==='act'?'act':type==='meal'?'meal':'craft'}" onclick="toggleFav('${type}','${id}');closeSpotlight()">
        ${fav ? '✕ Remove favourite' : '⭐ Save as favourite'}
      </button>
      <button class="btn btn-outline" onclick="closeSpotlight()">Close</button>
    </div>
  `;

  document.getElementById('spotlight-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeSpotlight() {
  document.getElementById('spotlight-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function onOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeSpotlight();
}

// ════════════════════════════════════════════
//  RANDOM PICKERS
// ════════════════════════════════════════════

function showRandom(type) {
  const pools = { act: filteredActs, meal: filteredMeals, craft: filteredCrafts };
  const items = pools[type]();
  if (!items.length) return;

  const item = items[Math.floor(Math.random() * items.length)];
  const rb = document.getElementById(`rb-${type}`);

  let badges = '';
  if (type === 'act')   badges = distBadge(item.dist) + priceBadge(item.price, item.priceLabel) + weatherBadge(item.weather);
  if (type === 'meal')  badges = timeBadge(item.time) + `<span class="badge b-cat">${catIcon(item.cat)} ${catLabel(item.cat)}</span>`;
  if (type === 'craft') badges = timeBadge(item.time) + messBadge(item.mess);

  rb.innerHTML = `
    <button class="rb-close" onclick="this.parentElement.classList.remove('show')">✕</button>
    <div class="rb-label">${type==='act'?'How about…':type==='meal'?'Tonight, make…':"Let's make…"}</div>
    <div class="rb-name">${item.icon} ${item.name}</div>
    <div class="rb-desc">${item.desc}</div>
    <div class="rb-badges">${badges}</div>
  `;
  rb.classList.add('show');

  // Bounce the button
  const btn = document.getElementById(`rand-${type}`);
  btn.classList.add('popping');
  btn.addEventListener('animationend', () => btn.classList.remove('popping'), {once:true});
}

function openModal(type) {
  S.modalType = type;
  const titles = { act: 'Add a place', meal: 'Add a meal', craft: 'Add a craft idea' };
  document.getElementById('modal-title').textContent = titles[type];
  document.getElementById('modal-body').innerHTML = MODAL_FORMS[type]();
  document.getElementById('modal-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
  S.modalType = null;
}

function saveCustomItem() {
  const type = S.modalType;
  const name = document.getElementById('f-name')?.value?.trim();
  if (!name) { document.getElementById('f-name').style.borderColor='red'; return; }

  const id = `custom-${type}-${Date.now()}`;
  const icon = document.getElementById('f-icon')?.value?.trim() || '📌';
  const desc = document.getElementById('f-desc')?.value?.trim() || '';
  const cat  = document.getElementById('f-cat')?.value || 'outdoor';

  let item = { id, name, icon, desc, cat };

  if (type === 'act') {
    item.dist     = parseInt(document.getElementById('f-dist')?.value) || 10;
    item.price    = parseInt(document.getElementById('f-price')?.value) || 0;
    item.priceLabel = ['Free','£','££','£££'][item.price];
    item.weather  = document.getElementById('f-weather')?.value || 'both';
    item.tags     = [];
    S.customActs.push(item);
    saveJSON('dh_customActs', S.customActs);
  } else if (type === 'meal') {
    item.time    = parseInt(document.getElementById('f-time')?.value) || 20;
    item.kidRating = 2;
    item.helpRating = 2;
    item.ingredients = (document.getElementById('f-ingredients')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
    S.customMeals.push(item);
    saveJSON('dh_customMeals', S.customMeals);
  } else if (type === 'craft') {
    item.time      = parseInt(document.getElementById('f-time')?.value) || 30;
    item.mess      = parseInt(document.getElementById('f-mess')?.value) || 1;
    item.materials = (document.getElementById('f-materials')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
    S.customCrafts.push(item);
    saveJSON('dh_customCrafts', S.customCrafts);
  }

  closeModal();
  renderChips();
  renderTab(type === 'act' ? 'activities' : type === 'meal' ? 'meals' : 'crafts');
}

// ════════════════════════════════════════════
//  EVENTS & INIT
// ════════════════════════════════════════════

function setActCat(val) { S.actCat = val; renderChips(); renderActivities(); }
function setActRegion(val) { S.actRegion = val; renderChips(); renderActivities(); }
function setMealCat(val) { S.mealCat = val; renderChips(); renderMeals(); }
function setCraftCat(val) { S.craftCat = val; renderChips(); renderCrafts(); }
function setPrice(val) { S.actMaxPrice = val; renderChips(); renderActivities(); }

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    S.tab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
    renderChips();
    renderTab(tab);
    // Hide any random banners when switching tabs
    document.querySelectorAll('.random-banner').forEach(rb => rb.classList.remove('show'));
  });
});

document.getElementById('dist-slider').addEventListener('input', function() {
  S.actMaxDist = parseInt(this.value);
  document.getElementById('dist-label').textContent = this.value >= 160 ? 'Any' : `${this.value} mi`;
  renderActivities();
});

document.getElementById('rand-act').addEventListener('click', () => showRandom('act'));
document.getElementById('rand-meal').addEventListener('click', () => showRandom('meal'));
document.getElementById('rand-craft').addEventListener('click', () => showRandom('craft'));

document.getElementById('add-act-btn').addEventListener('click', () => openModal('act'));
document.getElementById('add-meal-btn').addEventListener('click', () => openModal('meal'));
document.getElementById('add-craft-btn').addEventListener('click', () => openModal('craft'));

document.getElementById('modal-save').addEventListener('click', saveCustomItem);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeSpotlight(); closeModal(); }
});
